version: "3.9"

services:
  radius-postgres:
    image: postgres:17
    container_name: radius-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: radius
      POSTGRES_PASSWORD: Radius@2026
      POSTGRES_DB: radius

    ports:
      - "5433:5432"

    volumes:
      - radius_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radius"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  radius_postgres_data: