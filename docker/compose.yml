services:
  postgres:
    image: postgres:17
    container_name: orange-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orangeerp
      POSTGRES_USER: orangeerp
      POSTGRES_PASSWORD: OrangeERP@2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: orange-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: